# ── HTTP ─────────────────────────────────────────────────────────────
quarkus.http.port=8080

# ── Datasource (order_db) ────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:app}
quarkus.datasource.password=${DB_PASSWORD:app}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/order_db
quarkus.datasource.jdbc.max-size=20
# dev convenience — replace with Flyway/manual DDL before measured runs
quarkus.hibernate-orm.database.generation=update

# ── Redis (v3 existence+price cache, ARCHITECTURE.md §7.4) ───────────
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
# fail-open is implemented in code (CacheService.java catches errors and treats
# them as a miss) — keep the client's own timeout short so a down Redis doesn't
# add much latency to every request while we wait to fall through
quarkus.redis.timeout=500ms
# Quarkus's Redis client defaults to max-pool-size=6 / max-pool-waiting=24 —
# fine for light testing, but at 1000rps every one of those got exhausted
# almost instantly under real load (found running the actual k6 stress test):
# every command fell back to "miss" via fail-open, which then overloaded the
# REST fallback to product-service too. Sized up so Redis stays cheap and fast
# under the target load instead of becoming the bottleneck it's meant to avoid.
quarkus.redis.max-pool-size=${REDIS_POOL_SIZE:50}
quarkus.redis.max-pool-waiting=${REDIS_POOL_WAITING:200}

# ── REST client: product-service (cache-miss fallback only, §7.3) ────
quarkus.rest-client.product-service.url=http://${PRODUCT_SERVICE_HOST:localhost}:${PRODUCT_SERVICE_PORT:3000}
quarkus.rest-client.product-service.connect-timeout=2000
quarkus.rest-client.product-service.read-timeout=2000

# ── RabbitMQ (ARCHITECTURE.md §7.5) ───────────────────────────────────
#
# HOW TO READ THIS SECTION: in the Java code, you'll see things like
# @Channel("order-created") or @Incoming("stock-reserved") — those are just
# names, not RabbitMQ details. Every mp.messaging.* line below connects one of
# those names to an actual exchange/queue/routing-key. e.g. the code publishes
# to a channel called "order-created"; the line
# `mp.messaging.outgoing.order-created.default-routing-key=order.created`
# is what actually says "and that means routing key order.created on the
# ordering exchange." This split (name in code, wiring in config) is a
# Quarkus/MicroProfile pattern — the Nest reference project wires the exchange
# and routing key directly in the code that calls .publish()/.consume(), which
# is more familiar coming from NestJS but means the wiring is scattered across
# every call site instead of centralized here.
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:app}
rabbitmq-password=${RABBITMQ_PASSWORD:app}

# intake publisher: 201 only after the broker's publish confirm
mp.messaging.outgoing.order-created.connector=smallrye-rabbitmq
mp.messaging.outgoing.order-created.exchange.name=ordering
mp.messaging.outgoing.order-created.default-routing-key=order.created
mp.messaging.outgoing.order-created.publish-confirms=true

# every incoming channel: bounded in-flight work (max-outstanding ≈ JDBC pool),
# unexpected failures nack(requeue=false) into the shared DLQ — never dropped
mp.messaging.incoming.order-created-in.connector=smallrye-rabbitmq
mp.messaging.incoming.order-created-in.exchange.name=ordering
mp.messaging.incoming.order-created-in.queue.name=order-service.log
mp.messaging.incoming.order-created-in.routing-keys=order.created
mp.messaging.incoming.order-created-in.max-outstanding-messages=${LOG_OUTSTANDING:20}
mp.messaging.incoming.order-created-in.failure-strategy=reject
mp.messaging.incoming.order-created-in.auto-bind-dlq=true
mp.messaging.incoming.order-created-in.dead-letter-queue-name=ordering.dead-letter
mp.messaging.incoming.order-created-in.dead-letter-exchange=ordering.dlx
mp.messaging.incoming.order-created-in.dead-letter-exchange-type=fanout
mp.messaging.incoming.order-created-in.dead-letter-routing-key=dead

mp.messaging.incoming.stock-reserved.connector=smallrye-rabbitmq
mp.messaging.incoming.stock-reserved.exchange.name=ordering
mp.messaging.incoming.stock-reserved.queue.name=order-service.stock-reserved
mp.messaging.incoming.stock-reserved.routing-keys=stock.reserved
mp.messaging.incoming.stock-reserved.max-outstanding-messages=${STATUS_OUTSTANDING:20}
mp.messaging.incoming.stock-reserved.failure-strategy=reject
mp.messaging.incoming.stock-reserved.auto-bind-dlq=true
mp.messaging.incoming.stock-reserved.dead-letter-queue-name=ordering.dead-letter
mp.messaging.incoming.stock-reserved.dead-letter-exchange=ordering.dlx
mp.messaging.incoming.stock-reserved.dead-letter-exchange-type=fanout
mp.messaging.incoming.stock-reserved.dead-letter-routing-key=dead

mp.messaging.incoming.stock-rejected.connector=smallrye-rabbitmq
mp.messaging.incoming.stock-rejected.exchange.name=ordering
mp.messaging.incoming.stock-rejected.queue.name=order-service.stock-rejected
mp.messaging.incoming.stock-rejected.routing-keys=stock.rejected
mp.messaging.incoming.stock-rejected.max-outstanding-messages=${STATUS_OUTSTANDING:20}
mp.messaging.incoming.stock-rejected.failure-strategy=reject
mp.messaging.incoming.stock-rejected.auto-bind-dlq=true
mp.messaging.incoming.stock-rejected.dead-letter-queue-name=ordering.dead-letter
mp.messaging.incoming.stock-rejected.dead-letter-exchange=ordering.dlx
mp.messaging.incoming.stock-rejected.dead-letter-exchange-type=fanout
mp.messaging.incoming.stock-rejected.dead-letter-routing-key=dead
